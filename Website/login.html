<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prime Auto Works</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/favicon-32x32.png">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

    <!-- NAV BAR -->
    <!-- Added simple branding and links, swapping standalone text for a flexbox logo container -->
    <div class="nav">
        <div class="nav-inner">
            <a href="index.html" class="brand" aria-label="Prime Auto Works Home">
                <img src="images/logo_no_text.png" alt="Prime Auto Works Logo" class="nav-logo">
            </a>
            <nav class="nav-links" aria-label="Main navigation">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <a href="login.html">Login</a>
            </nav>
        </div>
        <p id="welcomeUser" class="welcome-user"></p>
    </div>

    <div class="login-container">
        <div class="login-box">
            <h3>Login Page</h3>

            <form id="loginForm">
                <label>Username / Email</label>
                <input type="text" id="username">

                <label>Password</label>
                <input type="password" id="password">

                <div class="login-buttons">
                    <button type="button" id="guestBtn">Continue as guest</button>
                    <button type="submit">Login</button>
                </div>
            </form>

            <p id="loginMessage"></p>

            <button type="button" id="helpBtn">Help</button>
        </div>
    </div>

    <div class="right-top">
        <!-- LOGO IMAGE -->
        <img src="images/logo.png" alt="Prime Auto Works Logo" class="logo">
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="footer-inner">
            <!-- Placeholder company details for a realistic footer layout -->
            <p>Prime Auto Works | 123 Service Lane, Belfast BT1 1AA</p>
            <p>Phone: 028 9000 1234 | Email: <a href="mailto:hello@primeautoworks.example">hello@primeautoworks.example</a></p>
            <p>Mon-Fri 8:30am-6:00pm | Sat 9:00am-2:00pm | Sun Closed</p>
            <p>&copy; 2026 Prime Auto Works. All rights reserved.</p>
        </div>
    </div>

    <script src="js/script.js"></script>

</body>
</html>
