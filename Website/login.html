<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prime Auto Works</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/favicon-32x32.png">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>
    <div class="wrapper">

        <!-- HEADER / NAV BAR -->
        <header class="header">
            <nav class="nav">
                <!-- Branding and Logo -->
                <div class="nav-left">
                    <a href="index.html" class="nav-brand">
                        <img src="images/logo_no_text.png" alt="Logo" class="nav-logo">
                        <h3 id="welcomeText">Welcome</h3>
                    </a>
                </div>

                <!-- Navigation Links -->
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="booking.html">Booking</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>

                <!-- Fixed Live Clock display -->
                <div class="nav-right">
                    <p id="liveClock" class="clock"></p>
                </div>
            </nav>
        </header>

        <!-- MAIN PAGE CONTENT -->
        <main class="main">
            <!-- LOGIN SECTION -->
            <section class="login-container">

                <!-- Logo sits centred above the login box -->
                <div class="banner-logo">
                    <img src="images/logo.png" alt="Prime Auto Works Logo" class="logo">
                </div>

                <div class="login-box">
                    <h3>Login to Prime Auto Works</h3>
                    <form id="loginForm">
                        <label for="username">Username / Email</label>
                        <input type="text" id="username">

                        <label for="password">Password</label>
                        <input type="password" id="password">

                        <div class="login-buttons">
                            <button type="button" id="guestBtn">Login as Guest</button>
                            <button type="submit">Login</button>
                        </div>
                    </form>

                    <p id="loginMessage"></p>
                    <button type="button" id="helpBtn">Help &amp; Support</button>
                </div>
            </section>
        </main>

        <!-- FOOTER -->
        <footer class="footer">
            <p>Open Mon - Fri: 9am-5pm &nbsp;|&nbsp; 07876 657456</p>
            <p>Mckenna-t17@ulster.ac.uk &nbsp;|&nbsp; Miszczuk-M@ulster.ac.uk &nbsp;|&nbsp; McTaggart-C4@ulster.ac.uk</p>
        </footer>

    </div>

    <!-- COOKIE BANNER -->
    <div id="cookieBanner">
        <p>This website uses cookies to improve your experience.</p>
        <button id="acceptCookies">Accept</button>
        <button id="declineCookies">Decline</button>
    </div>

    <!-- MAIN SCRIPT -->
    <script src="js/script.js"></script>

</body>
</html>
