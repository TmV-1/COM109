<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Prime Auto Works</title>

<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="images/favicon-32x32.png">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<div class="wrapper">

<!-- NAV BAR -->
<div class="nav">
    <!-- Live clock — populated by jQuery every second -->
    <p id="liveClock" style="margin:0; font-size:13px; opacity:0.85;"></p>
    <h3 id="welcomeText" style="margin:6px 0;">Welcome</h3>
    <p style="margin:0;">
        <a href="login.html">Login</a> -
        <a href="index.html">Home Page</a> -
        <a href="about.html">About Us</a> -
        <a href="contact.html">Contact Us</a>
    </p>
</div>

<!-- LOGIN -->
<div class="login-container">

    <div class="login-box">

        <h3>Login Page</h3>

        <form id="loginForm">

            <label>Username / Email</label>
            <input type="text" id="username">

            <label>Password</label>
            <input type="password" id="password">

            <div class="login-buttons">
                <button type="button" id="guestBtn">Continue as guest</button>
                <button type="submit">Login</button>
            </div>

        </form>

        <p id="loginMessage"></p>

        <button type="button" id="helpBtn">Help</button>

    </div>

</div>

<div class="right-top">
                <!-- LOGO IMAGE -->
                <img src="images/logo.png" alt="Prime Auto Works Logo" class="logo">
            </div>

<!-- FOOTER -->
    <div class="footer">
        <p>Open Mon - Fri: 9am-5pm &nbsp;|&nbsp; 07876 657456</p>
        <p>Mckenna-t17@ulster.ac.uk &nbsp;|&nbsp; Miszczuk-M@ulster.ac.uk &nbsp;|&nbsp; McTaggart-C4@ulster.ac.uk</p>
    </div>

</div><!-- end of section .wrapper -->

<!-- COOKIE BANNER -->
<div id="cookieBanner">
    <p style="margin:0 0 6px 0;">This website uses cookies to improve your experience.</p>
    <button id="acceptCookies">Accept</button>
    <button id="declineCookies">Decline</button>
</div>

<script src="js/script.js"></script>

</body>
</html>
